name: Bulid and Release

on:
  push:
    tags:
      - 'v*'

permissions: 
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: mvn clean package

      - uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: target/*.jar
